name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build DMG
        run: ./Scripts/build-dmg.sh "$GITHUB_REF_NAME"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "outputs/Kiyomemo-$GITHUB_REF_NAME.dmg" \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
